{% extends 'app/base.html' %}

{% block title %}Представьтесь{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-xl shadow-md p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Давайте познакомимся</h1>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div>
                <label class="block text-gray-700 font-medium mb-1">Имя</label>
                <input type="text" name="username" 
                       class="w-full px-4 py-2 border border-gray-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent bg-white" 
                       placeholder="Ваше имя" required>
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-1">Email (необязательно)</label>
                <input type="email" name="email" 
                       class="w-full px-4 py-2 border border-gray-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent bg-white" 
                       placeholder="example@mail.ru">
            </div>
            <div class="flex justify-between items-center pt-2">
                <button type="submit" class="bg-cyan-700 hover:bg-cyan-800 text-white font-semibold px-6 py-2 rounded-lg transition shadow-sm">
                    Продолжить
                </button>
                <a href="{% url 'home' %}" class="text-gray-500 hover:text-gray-700 transition">Вернуться на главную</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
