{% extends 'app/base.html' %}

{% block title %}Представьтесь{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-4">Для сохранения статистики введите ваше имя</h1>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="mb-4">
            <label class="block font-semibold mb-1">Имя</label>
            <input type="text" name="username" class="form-input" required>
        </div>
        <div class="mb-4">
            <label class="block font-semibold mb-1">Email (необязательно)</label>
            <input type="email" name="email" class="form-input">
        </div>
        <button type="submit" class="bg-cyan-700 text-white px-4 py-2 rounded">Продолжить</button>
    </form>
</div>
{% endblock %}
