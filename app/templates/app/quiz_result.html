{% extends 'app/base.html' %}

{% block title %}Результат теста{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md p-6 text-center">
    <h1 class="text-2xl font-bold text-gray-800 mb-4">Результат теста</h1>
    <div class="text-5xl font-bold text-cyan-700 mb-4">{{ score }} / {{ total }}</div>
    <p class="text-gray-600 mb-6">Правильных ответов: {% widthratio score total 100 %}%</p>
    <a href="{% url 'topics' topic.language.slug %}" class="bg-cyan-700 hover:bg-cyan-800 text-white px-6 py-2 rounded-lg transition">Вернуться к теме</a>
</div>
{% endblock %}
